syntax = "proto2";
package whatsapp;

/// WhatsApp Version: 2.3000.1035617621

message ADVDeviceIdentity {
  optional uint32 raw_id = 1;
  optional uint64 timestamp = 2;
  optional uint32 key_index = 3;
  optional ADVEncryptionType account_type = 4;
  optional ADVEncryptionType device_type = 5;
}

enum ADVEncryptionType {
  E2EE = 0;
  HOSTED = 1;
}
message ADVKeyIndexList {
  optional uint32 raw_id = 1;
  optional uint64 timestamp = 2;
  optional uint32 current_index = 3;
  repeated uint32 valid_indexes = 4 [packed = true];
  optional ADVEncryptionType account_type = 5;
}

message ADVSignedDeviceIdentity {
  optional bytes details = 1;
  optional bytes account_signature_key = 2;
  optional bytes account_signature = 3;
  optional bytes device_signature = 4;
}

message ADVSignedDeviceIdentityHMAC {
  optional bytes details = 1;
  optional bytes hmac = 2;
  optional ADVEncryptionType account_type = 3;
}

message ADVSignedKeyIndexList {
  optional bytes details = 1;
  optional bytes account_signature = 2;
  optional bytes account_signature_key = 3;
}

message AIHomeState {
  optional int64 last_fetch_time = 1;
  repeated AIHomeOption capability_options = 2;
  repeated AIHomeOption conversation_options = 3;
  message AIHomeOption {
    optional AIHomeActionType type = 1;
    optional string title = 2;
    optional string prompt_text = 3;
    optional string session_id = 4;
    optional string image_wds_identifier = 5;
    optional string image_tint_color = 6;
    optional string image_background_color = 7;
    optional string card_type_id = 8;
    enum AIHomeActionType {
      PROMPT = 0;
      CREATE_IMAGE = 1;
      ANIMATE_PHOTO = 2;
      ANALYZE_FILE = 3;
      COLLABORATE = 4;
    }
  }
}

message AIMediaCollectionMessage {
  optional string collection_id = 1;
  optional uint32 expected_media_count = 2;
  optional bool has_global_caption = 3;
}

message AIMediaCollectionMetadata {
  optional string collection_id = 1;
