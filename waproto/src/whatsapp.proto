}

message AIRegenerateMetadata {
  optional MessageKey message_key = 1;
  optional int64 response_timestamp_ms = 2;
}

message AIRichResponseCodeMetadata {
  optional string code_language = 1;
  repeated AIRichResponseCodeBlock code_blocks = 2;
  message AIRichResponseCodeBlock {
    optional AIRichResponseCodeMetadata.AIRichResponseCodeHighlightType highlight_type = 1;
    optional string code_content = 2;
  }

  enum AIRichResponseCodeHighlightType {
    AI_RICH_RESPONSE_CODE_HIGHLIGHT_DEFAULT = 0;
    AI_RICH_RESPONSE_CODE_HIGHLIGHT_KEYWORD = 1;
    AI_RICH_RESPONSE_CODE_HIGHLIGHT_METHOD = 2;
