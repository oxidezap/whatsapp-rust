    AI_RICH_RESPONSE_CODE_HIGHLIGHT_NUMBER = 4;
    AI_RICH_RESPONSE_CODE_HIGHLIGHT_COMMENT = 5;
  }
}

message AIRichResponseContentItemsMetadata {
  repeated AIRichResponseContentItemMetadata items_metadata = 1;
  optional ContentType content_type = 2;
  message AIRichResponseContentItemMetadata {
    oneof aIRichResponseContentItem {
      AIRichResponseContentItemsMetadata.AIRichResponseReelItem reel_item = 1;
    }
  }

  message AIRichResponseReelItem {
    optional string title = 1;
    optional string profile_icon_url = 2;
    optional string thumbnail_url = 3;
    optional string video_url = 4;
  }

  enum ContentType {
    DEFAULT = 0;
    CAROUSEL = 1;
  }
}

message AIRichResponseDynamicMetadata {
  optional AIRichResponseDynamicMetadataType type = 1;
  optional uint64 version = 2;
  optional string url = 3;
  optional uint32 loop_count = 4;
  enum AIRichResponseDynamicMetadataType {
