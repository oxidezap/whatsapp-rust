[package]
name = "waproto"
version = "0.6.0"
edition = "2024"
authors = ["João Lucas <jlucaso@hotmail.com>"]
license = "MIT"
repository = "https://github.com/jlucaso1/whatsapp-rust"
description = "Protocol Buffers definitions for WhatsApp"

[features]
default = []
serde-deserialize = []
serde-snake-case = ["serde-deserialize"]
# Enums (de)serialize as their numeric repr (prost parity) instead of the
# variant name — what the JS bridge / camelCase serializer expects.
serde-enum-repr = ["dep:serde_repr"]

[dependencies]
buffa = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_repr = { version = "0.1", optional = true }

[dev-dependencies]
serde_json = "1"

[build-dependencies]
buffa-build = { workspace = true }
sha2 = { workspace = true }

[lints]
workspace = true
